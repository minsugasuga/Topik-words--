<style>
:root{
  --navy:#0f1f3d;--navy2:#1a3160;--coral:#e8604a;--gold:#f5c842;
  --green:#2e9e6b;--bg:#f4f3ef;--card:#fff;--border:#e2e0d8;
  --text:#1a1a2e;--soft:#6b6b80;--radius:14px;
  --shadow:0 2px 12px rgba(15,31,61,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans SC','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(env(safe-area-inset-bottom) + 8px)}
button,select,input{font-family:inherit}

/* HEADER */
.header{background:var(--navy);padding:env(safe-area-inset-top) max(20px,env(safe-area-inset-right)) 0 max(20px,env(safe-area-inset-left));height:calc(56px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{color:#fff;font-size:17px;font-weight:700}
.logo span{color:var(--gold);font-size:12px;font-weight:400;margin-left:6px}
.hdr-stat{color:rgba(255,255,255,.45);font-size:12px}

/* TABS */
.tabs{background:var(--navy);border-top:1px solid rgba(255,255,255,.08);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:10px 14px;color:rgba(255,255,255,.45);font-size:13px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s;user-select:none}
.tab.active{color:#fff;border-bottom-color:var(--coral)}

/* MAIN */
.main{padding:18px 16px;max-width:780px;margin:0 auto}

/* STAT PILLS */
.stat-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat-pill{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;min-width:80px;text-align:center}
.stat-pill .n{font-size:22px;font-weight:700;color:var(--navy)}
.stat-pill .l{font-size:11px;color:var(--soft);margin-top:2px}

/* MODE GRID */
.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.mode-card{background:var(--card);border-radius:var(--radius);padding:18px 14px;border:1.5px solid var(--border);cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:left}
.mode-card:hover{border-color:var(--navy2);box-shadow:var(--shadow)}
.mode-card .icon{font-size:26px;margin-bottom:8px}
.mode-card .title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px}
.mode-card .desc{font-size:12px;color:var(--soft);line-height:1.5}

/* SEC HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:17px;font-weight:700;color:var(--navy)}
.back-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--soft);cursor:pointer}
.back-btn:hover{border-color:var(--navy);color:var(--navy)}

/* PROGRESS BAR */
.prog-bar{background:var(--border);border-radius:4px;height:5px;margin-bottom:8px}
.prog-fill{background:var(--coral);height:5px;border-radius:4px;transition:width .3s}

/* FLASH CARD */
.flashcard-wrap{perspective:1000px;cursor:pointer;margin:0 auto 16px;max-width:400px}
.flashcard{width:100%;position:relative;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,0,.2,1)}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;min-height:200px;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;box-shadow:0 4px 20px rgba(15,31,61,.1)}
.fc-front{background:var(--navy);color:#fff}
.fc-back{background:var(--card);transform:rotateY(180deg);border:2px solid var(--border)}
/* reserve space so absolute children still give height */
.flashcard{min-height:200px}
.fc-word{font-size:40px;font-weight:700;margin-bottom:8px;text-align:center;font-family:'Noto Sans KR',sans-serif}
.fc-hint{font-size:13px;opacity:.55}
.fc-meaning{font-size:24px;font-weight:700;color:var(--navy);text-align:center;margin-bottom:8px}
.fc-pos{font-size:12px;color:var(--soft);background:var(--bg);padding:3px 10px;border-radius:20px}
.fc-controls{display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.fc-btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:opacity .15s}
.fc-btn.know{background:var(--green);color:#fff}
.fc-btn.unknown{background:#f0f0ea;color:var(--text);border:1.5px solid var(--border)}
.fc-btn.skip{background:transparent;border:1.5px solid var(--border);color:var(--soft)}

/* SPELLING */
.spell-prompt{font-size:28px;font-weight:700;color:var(--navy);text-align:center;margin:12px 0 4px}
.spell-sub{font-size:13px;color:var(--soft);text-align:center;margin-bottom:18px}
.spell-input{width:100%;padding:14px;font-size:22px;border:2px solid var(--border);border-radius:12px;text-align:center;font-family:'Noto Sans KR',sans-serif;background:var(--card);color:var(--navy);outline:none;transition:border-color .18s}
.spell-input:focus{border-color:var(--navy2)}
.spell-input.correct{border-color:var(--green);background:#f0fff8}
.spell-input.wrong{border-color:var(--coral);background:#fff5f3}
.spell-fb{text-align:center;font-size:15px;font-weight:600;min-height:24px;margin:10px 0 4px}
.spell-fb.ok{color:var(--green)} .spell-fb.err{color:var(--coral)}
.spell-reveal{font-size:13px;color:var(--soft);text-align:center;min-height:18px;margin-bottom:10px}
.btn-row{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.btn-primary{background:var(--navy);color:#fff;border:none;padding:12px 26px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:var(--navy2)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--soft);padding:12px 18px;border-radius:10px;font-size:14px;cursor:pointer}

/* MCQ */
.dir-row{display:flex;gap:8px;margin-bottom:14px}
.dir-btn{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;background:var(--card);color:var(--soft);transition:all .15s}
.dir-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.mcq-q{background:var(--navy);color:#fff;border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:16px;min-height:110px;display:flex;align-items:center;justify-content:center}
.mcq-q-text{font-size:32px;font-weight:700;font-family:'Noto Sans KR',sans-serif;word-break:break-all}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mcq-opt{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:15px 10px;font-size:15px;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:border-color .12s,background .12s;word-break:break-all}
.mcq-opt:hover:not([disabled]){border-color:var(--navy2);background:#eef2ff}
.mcq-opt.correct{border-color:var(--green)!important;background:#f0fff8!important;color:var(--green)!important}
.mcq-opt.wrong{border-color:var(--coral)!important;background:#fff5f3!important;color:var(--coral)!important}
.mcq-opt[disabled]{cursor:default}
.score-line{text-align:center;font-size:14px;color:var(--soft);margin-bottom:12px}

/* RELATIONS */
.rel-tabs{display:flex;gap:8px;margin-bottom:14px}
.rel-tab{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-weight:600;cursor:pointer;background:var(--card);color:var(--soft);text-align:center;transition:all .15s}
.rel-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.search-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;margin-bottom:12px;background:var(--card);outline:none}
.search-input:focus{border-color:var(--navy2)}
.rel-list{display:flex;flex-direction:column;gap:10px}
.rel-card{background:var(--card);border-radius:12px;padding:14px 16px;border:1.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rel-word{display:flex;flex-direction:column;align-items:center;background:var(--bg);padding:10px 14px;border-radius:8px;min-width:76px}
.rel-word .kr{font-size:17px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:var(--navy)}
.rel-word .cn{font-size:11px;color:var(--soft);margin-top:2px}
.rel-sep{font-size:20px;font-weight:700;flex:none}
.rel-sep.ant{color:var(--coral)}
.rel-sep.syn{color:var(--green)}

/* INITIALS */
.letter-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.letter-btn{padding:6px 11px;border-radius:7px;border:1.5px solid var(--border);font-size:15px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;background:var(--card);font-weight:600;transition:all .15s}
.letter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.word-chip{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center}
.word-chip .kr{font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:var(--navy)}
.word-chip .cn{font-size:11px;color:var(--soft);margin-top:3px}

/* FILL */
.fill-card{background:var(--card);border-radius:16px;padding:20px;border:1.5px solid var(--border);margin-bottom:14px}
.fill-kr{font-size:19px;font-weight:600;color:var(--navy);margin-bottom:6px;line-height:1.6;font-family:'Noto Sans KR',sans-serif}
.fill-blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--coral);padding:0 4px;color:var(--coral)}
.fill-cn{font-size:13px;color:var(--soft);margin-bottom:16px}
.fill-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fill-opt{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:12px 8px;font-size:15px;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .12s}
.fill-opt:hover:not([disabled]){border-color:var(--navy2);background:#eef2ff}
.fill-opt.correct{border-color:var(--green)!important;background:#f0fff8!important;color:var(--green)!important}
.fill-opt.wrong{border-color:var(--coral)!important;background:#fff5f3!important;color:var(--coral)!important}
.fill-opt[disabled]{cursor:default}

/* EMPTY/DONE */
.done-screen{text-align:center;padding:40px 16px}
.done-screen .big{font-size:52px;margin-bottom:12px}
.done-screen h3{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px}
.done-screen p{font-size:14px;color:var(--soft);margin-bottom:24px;line-height:1.6}

/* RESPONSIVE */
@media(max-width:480px){
  .mode-grid{grid-template-columns:1fr}
  .mcq-opts,.fill-opts{grid-template-columns:1fr}
  .fc-word{font-size:32px}
  .mcq-q-text{font-size:24px}
}
</style>

<script>
// ═══════════ UTILS ═══════════
const $ = id => document.getElementById(id);
const app = () => $('app');
function setHTML(h){ app().innerHTML = h; }
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pickN(a,n){ return shuffle(a).slice(0,n); }
function posLabel(p){ return p==='동사'?'动词':p==='형용사'?'形容词':'名词'; }
// Safe key for data attribute (no quotes/slashes)
function safeKey(s){ return s.replace(/\\/g,'\\\\').replace(/"/g,'\\"'); }

// ═══════════ TAB ═══════════
let curTab = 'home';
function goTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  else document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
  curTab = tab;
  TAB_RENDER[tab]();
}

// ═══════════ HOME ═══════════
function renderHome(){
  setHTML(`
    <div class="stat-row">
      <div class="stat-pill"><div class="n">${VOCAB.length}</div><div class="l">总单词</div></div>
      <div class="stat-pill"><div class="n">20</div><div class="l">单元</div></div>
      <div class="stat-pill"><div class="n">${ANTONYMS.length+SYNONYMS.length}</div><div class="l">近反义词组</div></div>
    </div>
    <div class="mode-grid">
      ${[
        ['flash','🃏','闪卡记忆','翻转卡片查看意思，标记掌握情况'],
        ['spell','✏️','韩文拼写','看中文含义，练习韩文拼写输入'],
        ['mcq','📝','选择测试','韩→中 或 中→韩，四选一测验'],
        ['rel','🔗','反义/近义词','对比记忆相关联的单词'],
        ['init','🔤','首字母汇总','按首字母分类浏览，集中记忆'],
        ['fill','📖','句子填空','在句子语境中选择正确单词'],
      ].map(([tab,icon,title,desc])=>`
        <div class="mode-card" onclick="goTab('${tab}')">
          <div class="icon">${icon}</div>
          <div class="title">${title}</div>
          <div class="desc">${desc}</div>
        </div>`).join('')}
    </div>
  `);
}

// ═══════════ FLASH CARD ═══════════
let fcQ=[], fcIdx=0, fcKnow=0, fcNo=0, fcFlipped=false, fcWrong=[];

function initFlash(pool){ fcQ=shuffle(pool?[...pool]:[...VOCAB]); fcIdx=fcKnow=fcNo=0; fcWrong=[]; renderFlash(); }

function renderFlash(){
  setHTML(`
    <div class="sec-head">
      <div class="sec-title">🃏 闪卡记忆</div>
      <button class="back-btn" onclick="initFlash()">重新开始</button>
    </div>
    <div class="stat-row">
      <div class="stat-pill"><div class="n" id="fcK">${fcKnow}</div><div class="l">✅ 认识</div></div>
      <div class="stat-pill" id="fcNPill" onclick="fcShowWrong()" style="cursor:default"><div class="n" id="fcN" style="color:#0f1f3d">${fcNo}</div><div class="l" id="fcNLbl">❌ 不认识</div></div>
      <div class="stat-pill"><div class="n" id="fcL">${fcQ.length-fcIdx}</div><div class="l">剩余</div></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="fcP" style="width:${fcIdx/fcQ.length*100}%"></div></div>
    <div style="text-align:center;font-size:12px;color:var(--soft);margin-bottom:14px" id="fcStat">${fcIdx}/${fcQ.length}</div>
    <div id="fcArea"></div>
  `);
  renderFcCard();
}

function renderFcCard(){
  if(fcIdx>=fcQ.length){
    const wrongHtml = fcWrong.length===0
      ? `<p style="color:#2e9e6b;font-weight:600;margin:8px 0 16px">🎊 全部认识，没有错题！</p>`
      : `<div style="margin:12px 0 14px;text-align:left">
           <div style="font-size:12px;color:#6b6b80;font-weight:600;margin-bottom:8px;text-align:center">❌ 不认识的词（${fcWrong.length}个）</div>
           <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:14px">
             ${fcWrong.map(w=>`<div style="background:#f4f3ef;border:1.5px solid #f5c5c5;border-radius:8px;padding:8px 10px;text-align:center"><div style="font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#0f1f3d">${w.k}</div><div style="font-size:10px;color:#6b6b80;margin-top:2px">${w.c}</div></div>`).join('')}
           </div>
           <button class="btn-primary" style="width:100%;background:#e8604a;margin-bottom:8px" onclick="initFlash(fcWrong)">🔁 只练不认识的词（${fcWrong.length}个）</button>
         </div>`;
    $('fcArea').innerHTML=`<div class="done-screen">
      <div class="big">🎉</div><h3>全部完成！</h3>
      <p>认识 ${fcKnow} 个 · 不认识 ${fcNo} 个</p>
      ${wrongHtml}
      <button class="btn-ghost" onclick="initFlash()">重新开始（全部）</button>
    </div>`;
    return;
  }
  const w = fcQ[fcIdx];
  fcFlipped = false;
  $('fcArea').innerHTML=`
    <div class="flashcard-wrap" onclick="fcFlip()">
      <div class="flashcard" id="fc">
        <div class="fc-face fc-front">
          <div class="fc-word">${w.k}</div>
          <div class="fc-hint">点击查看意思</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-meaning">${w.c}</div>
          <div class="fc-pos">${posLabel(w.p)}</div>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn know" onclick="fcMark(1)">✅ 认识</button>
      <button class="fc-btn skip" onclick="fcSkip()">⏭ 跳过</button>
      <button class="fc-btn unknown" onclick="fcMark(0)">❌ 不认识</button>
    </div>`;
  updateFcStats();
}

function fcFlip(){ fcFlipped=!fcFlipped; $('fc')?.classList.toggle('flipped',fcFlipped); }
function fcMark(ok){ if(!ok){ fcNo++; fcWrong.push(fcQ[fcIdx]); } else fcKnow++; fcIdx++; renderFcCard(); updateFcStats(); }
function fcSkip(){ fcIdx++; renderFcCard(); updateFcStats(); }
function updateFcStats(){
  if(!$('fcK')) return;
  $('fcK').textContent=fcKnow; $('fcN').textContent=fcNo;
  $('fcL').textContent=fcQ.length-fcIdx;
  $('fcP').style.width=(fcIdx/fcQ.length*100)+'%';
  $('fcStat').textContent=fcIdx+'/'+fcQ.length;
  const pill=$('fcNPill'), hasW=fcWrong.length>0;
  if(pill){
    pill.style.cursor=hasW?'pointer':'default';
    pill.style.borderColor=hasW?'#e8604a':'';
    const n=$('fcN'); if(n) n.style.color=hasW?'#e8604a':'#0f1f3d';
    const lbl=$('fcNLbl'); if(lbl) lbl.innerHTML='❌ 不认识'+(hasW?`<span style="display:block;font-size:9px;color:#e8604a">(点击查看)</span>`:'');
  }
}
function fcShowWrong(){
  if(!fcWrong.length){return;}
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;overflow-y:auto;padding:20px;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:16px;padding:20px;max-width:500px;margin:20px auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700;color:#e8604a">❌ 不认识的词（${fcWrong.length}个）</div>
      <button onclick="this.closest('div[style*=fixed]').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#6b6b80">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:16px">
      ${fcWrong.map(w=>`<div style="background:#f4f3ef;border:1.5px solid #f5c5c5;border-radius:8px;padding:8px 10px;text-align:center"><div style="font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#0f1f3d">${w.k}</div><div style="font-size:10px;color:#6b6b80;margin-top:2px">${w.c}</div></div>`).join('')}
    </div>
    <button onclick="this.closest('div[style*=fixed]').remove();initFlash(fcWrong)" style="width:100%;background:#e8604a;color:#fff;border:none;padding:12px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px">🔁 只练这些不认识的词</button>
    <button onclick="this.closest('div[style*=fixed]').remove()" style="width:100%;background:transparent;border:1.5px solid #e2e0d8;color:#6b6b80;padding:10px;border-radius:9px;font-size:13px;cursor:pointer">继续当前练习</button>
  </div>`;
  document.body.appendChild(overlay);
}

// ═══════════ SPELLING ═══════════
let spQ=[], spIdx=0, spOk=0, spErr=0, spAnswered=false, spWrong=[];

function initSpell(pool){ spQ=shuffle(pool?[...pool]:[...VOCAB]); spIdx=spOk=spErr=0; spWrong=[]; renderSpell(); }

function renderSpell(){
  setHTML(`
    <div class="sec-head">
      <div class="sec-title">✏️ 韩文拼写</div>
      <button class="back-btn" onclick="initSpell()">重新开始</button>
    </div>
    <div class="stat-row">
      <div class="stat-pill"><div class="n" id="spOkN">${spOk}</div><div class="l">✅ 正确</div></div>
      <div class="stat-pill" id="spErrPill" onclick="spShowWrong()" style="cursor:default"><div class="n" id="spErrN" style="color:#0f1f3d">${spErr}</div><div class="l" id="spErrLbl">❌ 错误</div></div>
      <div class="stat-pill"><div class="n" id="spLN">${spQ.length-spIdx}</div><div class="l">剩余</div></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="spP" style="width:${spIdx/spQ.length*100}%"></div></div>
    <div style="height:10px"></div>
    <div id="spArea"></div>
  `);
  renderSpCard();
}

function renderSpCard(){
  if(spIdx>=spQ.length){
    const wrongHtml = spWrong.length===0
      ? `<p style="color:#2e9e6b;font-weight:600;margin:8px 0 16px">🎊 全对，没有错题！</p>`
      : `<div style="margin:12px 0 14px;text-align:left">
           <div style="font-size:12px;color:#6b6b80;font-weight:600;margin-bottom:8px;text-align:center">❌ 拼写错误的词（${spWrong.length}个）</div>
           <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
             ${spWrong.map(w=>`<div style="background:#fff5f3;border:1.5px solid #f5c5c5;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px"><div style="font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#0f1f3d;min-width:120px">${w.k}</div><div style="font-size:12px;color:#6b6b80;flex:1">${w.c}</div><div style="font-size:10px;background:#f4f3ef;color:#6b6b80;padding:2px 7px;border-radius:10px;flex:none">${posLabel(w.p)}</div></div>`).join('')}
           </div>
           <button class="btn-primary" style="width:100%;background:#e8604a;margin-bottom:8px" onclick="initSpell(spWrong)">🔁 只练拼写错误的词（${spWrong.length}个）</button>
         </div>`;
    $('spArea').innerHTML=`<div class="done-screen">
      <div class="big">🎉</div><h3>全部完成！</h3>
      <p>正确 ${spOk} 个 · 错误 ${spErr} 个</p>
      ${wrongHtml}
      <button class="btn-ghost" onclick="initSpell()">重新开始（全部）</button>
    </div>`;
    return;
  }
  spAnswered = false;
  const w = spQ[spIdx];
  $('spArea').innerHTML=`
    <div class="spell-prompt">${w.c}</div>
    <div class="spell-sub">${posLabel(w.p)}</div>
    <input id="spIn" class="spell-input" type="text" placeholder="输入韩文…" autocomplete="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter'){event.preventDefault();spSubmit();}">
    <div class="spell-fb" id="spFb"></div>
    <div class="spell-reveal" id="spRev"></div>
    <div class="btn-row">
      <button class="btn-primary" id="spBtn" onclick="spSubmit()">确认</button>
      <button class="btn-ghost" onclick="spSkip()">跳过</button>
    </div>`;
  $('spIn').focus();
  updateSpStats();
}

function spSubmit(){
  if(spAnswered){ spNext(); return; }
  const inp=$('spIn'), w=spQ[spIdx], val=inp.value.trim();
  if(!val) return;
  spAnswered=true;
  const ok=val===w.k;
  inp.classList.add(ok?'correct':'wrong');
  $('spFb').textContent=ok?'✅ 正确！':'❌ 拼写有误';
  $('spFb').className='spell-fb '+(ok?'ok':'err');
  // 无论对错都显示答案卡，错了同时记录
  $('spRev').innerHTML = ok
    ? `<div style="margin-top:6px;background:#f0fff8;border:1.5px solid #2e9e6b;border-radius:9px;padding:10px 14px;text-align:center"><div style="font-size:11px;color:#2e9e6b;margin-bottom:2px">✅ 正确答案</div><div style="font-size:22px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#2e9e6b">${w.k}</div></div>`
    : `<div style="margin-top:6px;background:#fff5f3;border:1.5px solid #e8604a;border-radius:9px;padding:10px 14px;text-align:center"><div style="font-size:11px;color:#e8604a;margin-bottom:2px">正确答案是</div><div style="font-size:22px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#e8604a">${w.k}</div><div style="font-size:12px;color:#6b6b80;margin-top:4px">你输入了：<span style="color:#e8604a">${val}</span></div></div>`;
  $('spBtn').textContent='下一个 →';
  if(ok) spOk++; else { spErr++; spWrong.push(w); }
  updateSpStats();
}
function spNext(){ spIdx++; spAnswered=false; renderSpCard(); }
function spSkip(){ spIdx++; spAnswered=false; renderSpCard(); }
function updateSpStats(){
  if(!$('spOkN')) return;
  $('spOkN').textContent=spOk; $('spErrN').textContent=spErr;
  $('spLN').textContent=spQ.length-spIdx;
  $('spP').style.width=(spIdx/spQ.length*100)+'%';
  const pill=$('spErrPill'), hasW=spWrong.length>0;
  if(pill){
    pill.style.cursor=hasW?'pointer':'default';
    pill.style.borderColor=hasW?'#e8604a':'';
    const n=$('spErrN'); if(n) n.style.color=hasW?'#e8604a':'#0f1f3d';
    const lbl=$('spErrLbl'); if(lbl) lbl.innerHTML='❌ 错误'+(hasW?`<span style="display:block;font-size:9px;color:#e8604a">(点击查看)</span>`:'');
  }
}
function spShowWrong(){
  if(!spWrong.length){return;}
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;overflow-y:auto;padding:20px;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:16px;padding:20px;max-width:500px;margin:20px auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700;color:#e8604a">❌ 拼写错误的词（${spWrong.length}个）</div>
      <button onclick="this.closest('div[style*=fixed]').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#6b6b80">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
      ${spWrong.map(w=>`<div style="background:#fff5f3;border:1.5px solid #f5c5c5;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px"><div style="font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#0f1f3d;min-width:120px">${w.k}</div><div style="font-size:12px;color:#6b6b80;flex:1">${w.c}</div><div style="font-size:10px;background:#f4f3ef;color:#6b6b80;padding:2px 7px;border-radius:10px">${posLabel(w.p)}</div></div>`).join('')}
    </div>
    <button onclick="this.closest('div[style*=fixed]').remove();initSpell(spWrong)" style="width:100%;background:#e8604a;color:#fff;border:none;padding:12px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px">🔁 只练这些拼写错误的词</button>
    <button onclick="this.closest('div[style*=fixed]').remove()" style="width:100%;background:transparent;border:1.5px solid #e2e0d8;color:#6b6b80;padding:10px;border-radius:9px;font-size:13px;cursor:pointer">继续当前练习</button>
  </div>`;
  document.body.appendChild(overlay);
}

// ═══════════ MCQ ═══════════
let mcqQ=[], mcqIdx=0, mcqOk=0, mcqErr=0, mcqDir='kr2cn';

function initMcq(){ mcqQ=shuffle([...VOCAB]); mcqIdx=mcqOk=mcqErr=0; renderMcqCard(); }

function renderMcq(){
  setHTML(`
    <div class="sec-head">
      <div class="sec-title">📝 选择测试</div>
      <button class="back-btn" onclick="initMcq()">重新开始</button>
    </div>
    <div class="dir-row">
      <button class="dir-btn ${mcqDir==='kr2cn'?'active':''}" onclick="setMcqDir('kr2cn')">韩 → 中</button>
      <button class="dir-btn ${mcqDir==='cn2kr'?'active':''}" onclick="setMcqDir('cn2kr')">中 → 韩</button>
    </div>
    <div class="score-line" id="mcqScore">正确 ${mcqOk} / ${mcqIdx} 题</div>
    <div id="mcqArea"></div>
  `);
  if(!mcqQ.length) initMcq(); else renderMcqCard();
}

function setMcqDir(d){ mcqDir=d; document.querySelectorAll('.dir-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===(d==='kr2cn'?'韩 → 中':'中 → 韩'))); }

function renderMcqCard(){
  if(!$('mcqArea')) return;
  if(mcqIdx>=mcqQ.length){
    $('mcqArea').innerHTML=`<div class="done-screen">
      <div class="big">🏆</div><h3>测试完成！</h3>
      <p>正确 ${mcqOk} 题 · 错误 ${mcqErr} 题<br>正确率 ${Math.round(mcqOk/(mcqQ.length||1)*100)}%</p>
      <button class="btn-primary" onclick="initMcq()">再来一遍</button>
    </div>`;
    return;
  }
  const w = mcqQ[mcqIdx];
  // Distractors: same pos preferred
  const pool = VOCAB.filter(v=>v.k!==w.k&&v.p===w.p);
  const wrong3 = pickN(pool.length>=3?pool:VOCAB.filter(v=>v.k!==w.k), 3);
  const opts = shuffle([w, ...wrong3]);

  // KEY FIX: store answer index in data-idx, never rely on textContent matching
  const qText = mcqDir==='kr2cn' ? w.k : w.c;
  const correctIdx = opts.indexOf(w);

  const optHtml = opts.map((o,i)=>{
    const label = mcqDir==='kr2cn' ? o.c : o.k;
    return `<button class="mcq-opt" data-i="${i}" data-correct="${i===correctIdx?1:0}" onclick="mcqAns(this,${i==correctIdx?1:0})">${label}</button>`;
  }).join('');

  $('mcqArea').innerHTML=`
    <div class="mcq-q"><div class="mcq-q-text">${qText}</div></div>
    <div class="mcq-opts" id="mcqOpts">${optHtml}</div>
    <div style="height:14px"></div>`;

  if($('mcqScore')) $('mcqScore').textContent=`正确 ${mcqOk} / ${mcqIdx} 题`;
}

function mcqAns(el, isCorrect){
  // disable all opts
  document.querySelectorAll('.mcq-opt').forEach(b=>{ b.disabled=true; b.onclick=null; });
  el.classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect){
    document.querySelectorAll('.mcq-opt[data-correct="1"]').forEach(b=>b.classList.add('correct'));
  }
  if(isCorrect) mcqOk++; else mcqErr++;
  mcqIdx++;
  if($('mcqScore')) $('mcqScore').textContent=`正确 ${mcqOk} / ${mcqIdx} 题`;
  setTimeout(renderMcqCard, isCorrect?550:1300);
}

// ═══════════ RELATIONS ═══════════
let relMode='ant';

function renderRel(){
  setHTML(`
    <div class="sec-head"><div class="sec-title">🔗 反义 / 近义词</div></div>
    <div class="rel-tabs">
      <div class="rel-tab ${relMode==='ant'?'active':''}" onclick="setRelMode('ant')">↔ 反义词 (${ANTONYMS.length}组)</div>
      <div class="rel-tab ${relMode==='syn'?'active':''}" onclick="setRelMode('syn')">≈ 近义词 (${SYNONYMS.length}组)</div>
    </div>
    <input class="search-input" id="relQ" placeholder="搜索单词…" oninput="renderRelList()">
    <div class="rel-list" id="relList"></div>
  `);
  renderRelList();
}

function setRelMode(m){ relMode=m; renderRel(); }

function renderRelList(){
  const q=($('relQ')?.value||'').trim();
  const data=relMode==='ant'?ANTONYMS:SYNONYMS;
  const sep=relMode==='ant'?'↔':'≈';
  const sc=relMode==='ant'?'ant':'syn';
  const filtered=q?data.filter(g=>g.some(w=>w.k.includes(q)||w.c.includes(q))):data;
  $('relList').innerHTML=filtered.length
    ? filtered.map(g=>`<div class="rel-card">${g.map((w,i)=>(i?`<div class="rel-sep ${sc}">${sep}</div>`:'')+'<div class="rel-word"><div class="kr">'+w.k+'</div><div class="cn">'+w.c+'</div></div>').join('')}</div>`).join('')
    : '<div style="text-align:center;color:var(--soft);padding:32px">没有找到</div>';
}

// ═══════════ INITIALS ═══════════
let initLetter=null;

function renderInit(){
  const letters=Object.keys(INITIALS).sort();
  setHTML(`
    <div class="sec-head"><div class="sec-title">🔤 首字母汇总</div></div>
    <input class="search-input" id="initQ" placeholder="搜索单词…" oninput="initSearch()">
    <div class="letter-grid">${letters.map(l=>`<button class="letter-btn ${initLetter===l?'active':''}" onclick="pickLetter('${l}')">${l}</button>`).join('')}</div>
    <div id="initWords">${initLetter?renderInitWords(initLetter):'<div style="text-align:center;color:var(--soft);padding:20px">点击字母查看该组单词</div>'}</div>
  `);
}

function renderInitWords(l){
  const ws=INITIALS[l]||[];
  return `<div style="font-size:13px;color:var(--soft);margin-bottom:10px">「${l}」开头共 ${ws.length} 个单词</div>
    <div class="word-grid">${ws.map(w=>`<div class="word-chip"><div class="kr">${w.k}</div><div class="cn">${w.c}</div></div>`).join('')}</div>`;
}

function pickLetter(l){
  initLetter=initLetter===l?null:l;
  renderInit();
}

function initSearch(){
  const q=$('initQ')?.value.trim();
  if(!q){ $('initWords').innerHTML=initLetter?renderInitWords(initLetter):'<div style="text-align:center;color:var(--soft);padding:20px">点击字母查看</div>'; return; }
  const res=[];
  Object.values(INITIALS).forEach(ws=>ws.forEach(w=>{ if(w.k.includes(q)||w.c.includes(q)) res.push(w); }));
  $('initWords').innerHTML=res.length
    ? `<div style="font-size:13px;color:var(--soft);margin-bottom:10px">找到 ${res.length} 个</div><div class="word-grid">${res.map(w=>`<div class="word-chip"><div class="kr">${w.k}</div><div class="cn">${w.c}</div></div>`).join('')}</div>`
    : '<div style="text-align:center;color:var(--soft);padding:20px">未找到</div>';
}

// ═══════════ FILL IN BLANK ═══════════
let fillQ=[], fillIdx=0, fillOk=0, fillErr=0;

function initFill(){ fillQ=shuffle([...FILL]); fillIdx=fillOk=fillErr=0; renderFillCard(); }

function renderFill(){
  setHTML(`
    <div class="sec-head">
      <div class="sec-title">📖 句子填空</div>
      <button class="back-btn" onclick="initFill()">重新开始</button>
    </div>
    <div class="score-line" id="fillScore">正确 ${fillOk} / ${fillIdx} 题</div>
    <div id="fillArea"></div>
  `);
  if(!fillQ.length) initFill(); else renderFillCard();
}

function renderFillCard(){
  if(!$('fillArea')) return;
  if(fillIdx>=fillQ.length){
    $('fillArea').innerHTML=`<div class="done-screen">
      <div class="big">📚</div><h3>全部完成！</h3>
      <p>正确 ${fillOk} 题 · 错误 ${fillErr} 题<br>正确率 ${Math.round(fillOk/(fillQ.length||1)*100)}%</p>
      <button class="btn-primary" onclick="initFill()">再来一遍</button>
    </div>`;
    return;
  }
  const item=fillQ[fillIdx];
  const ans=item.ans;
  // 同词性干扰项
  const ansV=VOCAB.find(v=>v.k===ans);
  const pool=ansV?VOCAB.filter(v=>v.k!==ans&&v.p===ansV.p):VOCAB.filter(v=>v.k!==ans);
  const wrong3=pickN(pool.length>=3?pool:VOCAB.filter(v=>v.k!==ans),3).map(v=>v.k);
  const opts=shuffle([ans,...wrong3]);

  // Build display: replace ____ with styled blank
  const skDisplay=item.sk.replace('____','<span class="fill-blank">____</span>');

  if($('fillScore')) $('fillScore').textContent=`正确 ${fillOk} / ${fillIdx} 题`;

  $('fillArea').innerHTML=`
    <div class="fill-card">
      <div class="fill-kr">${skDisplay}</div>
      <div class="fill-cn">${item.sc}</div>
      <div class="fill-opts" id="fillOpts">
        ${opts.map(o=>`<button class="fill-opt" data-correct="${o===ans?1:0}" onclick="fillAns(this,'${o===ans?1:0}')">${o}</button>`).join('')}
      </div>
    </div>`;
}

function fillAns(el, isCorrect){
  const ok=isCorrect==='1';
  document.querySelectorAll('.fill-opt').forEach(b=>{ b.disabled=true; b.onclick=null; });
  el.classList.add(ok?'correct':'wrong');
  if(!ok) document.querySelectorAll('.fill-opt[data-correct="1"]').forEach(b=>b.classList.add('correct'));
  if(ok) fillOk++; else fillErr++;
  fillIdx++;
  if($('fillScore')) $('fillScore').textContent=`正确 ${fillOk} / ${fillIdx} 题`;
  setTimeout(renderFillCard, ok?550:1300);
}

// ═══════════ TAB MAP & INIT ═══════════
const TAB_RENDER = {
  home: renderHome,
  flash: ()=>{ if(!fcQ.length) initFlash(); else renderFlash(); },
  spell: ()=>{ if(!spQ.length) initSpell(); else renderSpell(); },
  mcq: renderMcq,
  rel: renderRel,
  init: renderInit,
  fill: ()=>{ if(!fillQ.length) initFill(); else renderFill(); },
};

renderHome();
</script>
</body>
